# Grafana Alloy — log and trace collector for Loki and Tempo
# Replaces Promtail as the recommended collector
# Ref: https://grafana.com/docs/alloy/latest/collect/logs-in-kubernetes/
alloy:
  # Expose OTLP ports so instrumented apps can send traces to alloy.monitoring:4317/4318
  extraPorts:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  configMap:
    content: |
      // ============================================================
      // Pod Logs — collect from Kubernetes API with metadata labels
      // ============================================================

      // Discover all pods in the cluster
      discovery.kubernetes "pod" {
        role = "pod"
      }

      // Extract Kubernetes metadata into labels so we can filter
      // by namespace, pod, container, and app in Loki/Grafana
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pod.targets

        // namespace label from pod metadata
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "replace"
          target_label  = "namespace"
        }

        // pod label from pod metadata
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action        = "replace"
          target_label  = "pod"
        }

        // container label from pod metadata
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "container"
        }

        // app label from the standard k8s label
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "replace"
          target_label  = "app"
        }

        // job label as namespace/container
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "job"
          separator     = "/"
          replacement   = "$1"
        }
      }

      // Tail logs from discovered pods using the Kubernetes API
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      // Add a static cluster label before sending to Loki
      loki.process "pod_logs" {
        stage.static_labels {
          values = {
            cluster = "kind",
          }
        }
        forward_to = [loki.write.default.receiver]
      }

      // ============================================================
      // Kubernetes Cluster Events
      // ============================================================

      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      loki.process "cluster_events" {
        stage.static_labels {
          values = {
            cluster = "kind",
          }
        }
        stage.labels {
          values = {
            kubernetes_cluster_events = "job",
          }
        }
        forward_to = [loki.write.default.receiver]
      }

      // ============================================================
      // Loki write endpoint
      // ============================================================

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring:3100/loki/api/v1/push"
        }
      }

      // ============================================================
      // OTLP Traces — receive and forward to Tempo
      // ============================================================

      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring:4317"
          tls {
            insecure = true
          }
        }
      }
