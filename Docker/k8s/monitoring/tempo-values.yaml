# Tempo — monolithic mode for kind lab (IPv4)
# Chart: oci://ghcr.io/grafana-community/helm-charts/tempo
# Uses local filesystem storage (no S3/MinIO needed)
tempo:
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-stack-kube-prom-prometheus.monitoring:9090/api/v1/write"
    processor:
      service_graphs:
        dimensions:
          - service.namespace
      span_metrics:
        dimensions:
          - service.namespace
          - http.method
          - http.status_code
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
persistence:
  enabled: true
  size: 5Gi
