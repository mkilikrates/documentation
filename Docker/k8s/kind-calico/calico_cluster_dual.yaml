kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true # to install calico
  apiServerAddress: "$MY_PRIVATE_IP"
  apiServerPort: 6443
  # nftables mode (GA since K8s 1.31) — successor to iptables mode
  kubeProxyMode: nftables
  ipFamily: dual # enable dualstack
  # Both IPv4 and IPv6 subnets must be specified in dual-stack mode
  podSubnet: "10.244.0.0/16,fd00:10:244::/56" # IPv4 first, then IPv6 for Calico compatibility
  serviceSubnet: "10.96.0.0/12,fd00:10:96::/112" # IPv4 first, then IPv6
# Add local registry
containerdConfigPatches:
# patches for local registry
- |-
  [plugins."io.containerd.grpc.v1.cri".registry]
    config_path = "/etc/containerd/certs.d"
# Patches for Prometheus scraping (bind metrics endpoints to 0.0.0.0)
# Using v1beta4 API for K8s 1.31+ (v1beta3 is deprecated)
kubeadmConfigPatches:
- |-
  kind: ClusterConfiguration
  controllerManager:
    extraArgs:
      bind-address: "::"
  scheduler:
    extraArgs:
      bind-address: "::"
  etcd:
    local:
      extraArgs:
        listen-metrics-urls: "http://[::]:2381"
- |-
  kind: KubeProxyConfiguration
  metricsBindAddress: "::"
nodes:
  - role: control-plane
    extraPortMappings:
      # nginx-fabric
      - containerPort: 31437
        hostPort: 8080
        protocol: TCP
      - containerPort: 31438
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker